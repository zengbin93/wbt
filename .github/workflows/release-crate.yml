name: Release Crate

on:
  push:
    tags: ["crate-v*"]

permissions:
  contents: read

jobs:
  publish:
    name: Publish to Crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: cargo test --lib
      - run: cargo publish -p wbt --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
