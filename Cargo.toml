[workspace]
members = ["crates/wbt-core"]

[package]
name = "wbt"
version = "0.1.0"
edition = "2024"
description = "Weight-based backtesting engine for quantitative trading"
license = "MIT"
repository = "https://github.com/zengbin93/wbt"

[lib]
name = "wbt"
crate-type = ["cdylib", "lib"]

[dependencies]
wbt-core = { path = "crates/wbt-core" }
pyo3 = { version = "0.25", features = ["extension-module"] }
numpy = "0.25"
polars = { version = "0.46", default-features = false, features = ["ipc"] }

[workspace.dependencies]
polars = { version = "0.46", default-features = false }

[profile.release]
lto = "fat"
codegen-units = 1
opt-level = 3
strip = "symbols"
